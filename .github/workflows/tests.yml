name: Tests

# Controls when the action will run. Triggers the workflow on manual trigger or push
on:
  push:
    branches: 
    - staging
    - master
    - tests_pipeline
    paths-ignore:
      - '**.md'

jobs:
  run-unit-tests:
    if: github.ref=='refs/heads/tests_pipeline'
    runs-on: ubuntu-latest
    env:
      DB_HOST: 127.0.0.1
      DB_DATABASE: canvas-api
      DB_USERNAME: root
      DB_PASSWORD: root
      KPAS_DOMAIN: 127.0.0.1
      KPAS_LTI_GIT_COMMIT: 5263fc96967971ef81b5b2248d87692add922cf7  #Exactly which state in the KPAS-LTI git repository should be used as dependency during our tests
      DJANGO_SECRET_KEY: not_secret_key
      CA_FILE_NAME: ca.crt

    steps:
        # GitHub repository checkout
      - name: GitHub repository checkout
        uses: actions/checkout@v1

      - name: Start MySQL service
        run: |
          sudo systemctl start mysql.service
      
      - name: Pull code from KPAS-LTI GitHub repository
        run: |
          git clone https://github.com/matematikk-mooc/kpas-api
      
      - name: Copy self-signed certificates and keys to KPAS-LTI nginx dir
        run: |
          cp $GITHUB_WORKSPACE/.github/kpas_ssl_certs/* kpas-api/docker/nginx/ssl/
        
      - name: Start KPAS-LTI service
        run: |
          cd kpas-api
          git checkout $KPAS_LTI_GIT_COMMIT
          cd docker
          cp .env.example .env
          sed -i 's/MYSQL_PORT=3306/MYSQL_PORT=3307/g' .env
          sudo chown $(whoami):$(whoami) -R * && sudo chmod 777 -R *
          docker-compose up --build -d
          COMPOSE_INTERACTIVE_NO_CLI=1 docker-compose exec --user root workspace ./startup.sh
          cd ./../..

      - name: Populate KPAS with data from NSR
        run: |
          COMPOSE_INTERACTIVE_NO_CLI=1 docker-compose exec --user root workspace /bin/bash -c "php artisan fetch_from:nsr"

      - name: Install python depedencies
        run: |
          sudo apt-get install python3-setuptools
          python3 -m pip install -r requirements.txt
      
      - name: Run Django migrations
        run: |
          mysql -h 127.0.0.1 -uroot -proot -e 'CREATE DATABASE `canvas-api`;'
          python3 manage.py makemigrations
          python3 manage.py migrate
          PYTHONPATH="${GITHUB_WORKSPACE}" python3 manage.py test --verbosity=0 --keepdb || true          

      - name: Import test data to MySQL
        run: mysql -uroot -proot < $GITHUB_WORKSPACE/statistics_api/tests/data/canvas_api_test_data.sql

      - name: Run Django unit tests
        run: |
          PYTHONPATH="${GITHUB_WORKSPACE}" python3 manage.py test --verbosity=2 --keepdb

          